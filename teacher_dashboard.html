<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="navbar">
        <h2>Teacher Panel</h2>

        <nav>
            <a href="#" onclick="showSection('home')">Home</a>
            <a href="#" onclick="showSection('students')">Students</a>
            <a href="#" onclick="showSection('assignments')">Assignments</a>
            <a href="#" onclick="showSection('attendance')">Attendance</a>
            <a href="index.html">Logout</a>
        </nav>

    </header>


    <section id="home" class="dashboard-section">
        <h2>Welcome Teacher</h2>

        <div class="dashboard-container">

            <div class="card">
                <h3>Total Students</h3>
                <p>120</p>
            </div>

            <div class="card">
                <h3>Assignments Created</h3>
                <p>10</p>
            </div>

            <div class="card">
                <h3>Classes Today</h3>
                <p>4</p>
            </div>

        </div>

    </section>


    <section id="students" class="dashboard-section" style="display:none;">
        <h2>Student List</h2>
        <p>List of students will appear here.</p>
    </section>


    <section id="assignments" class="dashboard-section" style="display:none;">
        <h2>Create Assignment</h2>
        <p>Teachers can upload assignments here.</p>
    </section>


    <section id="attendance" class="dashboard-section" style="display:none;">
        <h2>Mark Attendance</h2>
        <p>Attendance system will be here.</p>
    </section>




    </script>

</body>

</html>
